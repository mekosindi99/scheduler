<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Scheduler — Cloud Token Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />

  <!-- ════════════════════════════════════════════════════════
       🔥 FIREBASE CONFIG — ضع إعداداتك هنا
       1. اذهب إلى console.firebase.google.com
       2. أنشئ مشروعاً جديداً
       3. Project Settings → Your apps → Add Web App
       4. انسخ الـ firebaseConfig وضعه هنا
  ════════════════════════════════════════════════════════ -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore, collection, addDoc, getDocs, deleteDoc,
      doc, updateDoc, query, orderBy, serverTimestamp, Timestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ══════════════════════════════════════════════
    // 🔧 ضع إعدادات Firebase الخاصة بك هنا
    // ══════════════════════════════════════════════
    const firebaseConfig = {
      apiKey:            "AIzaSyDvmsDf8wgpQCPBUXgL-7rLuJORmiBUR4Q",
      authDomain:        "emailscheduler-dacb2.firebaseapp.com",
      projectId:         "emailscheduler-dacb2",
      storageBucket:     "emailscheduler-dacb2.firebasestorage.app",
      messagingSenderId: "284820651259",
      appId:             "1:284820651259:web:f7567ee66ea7499c3b845e",
      measurementId:     "G-LTDCGJSHW9"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const COL = "scheduledJobs";

    // ══════════════════════════════════════════════
    // Firebase API — exposed to window
    // ══════════════════════════════════════════════
    window.FB = {
      async addJob(data) {
        const ref = await addDoc(collection(db, COL), {
          ...data,
          createdAt:  serverTimestamp(),
          cycleCount: 0,
          lastFired:  null,
        });
        return ref.id;
      },
      async getJobs() {
        const q   = query(collection(db, COL), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        return snap.docs.map(d => ({ id: d.id, ...d.data() }));
      },
      async deleteJob(id) {
        await deleteDoc(doc(db, COL, id));
      },
      async updateJob(id, data) {
        await updateDoc(doc(db, COL, id), data);
      },
      Timestamp
    };

    // ══════════════════════════════════════════════
    // Cron Check — runs every 60 seconds in browser
    // (For real server-side cron see README below)
    // ══════════════════════════════════════════════
    async function cronCheck() {
      try {
        const jobs = await window.FB.getJobs();
        const now  = Date.now();
        for (const job of jobs) {
          const reactivateMs = job.reactivateAt?.toMillis?.() ?? new Date(job.reactivateAt).getTime();
          const stopMs       = job.stopTime?.toMillis?.()     ?? new Date(job.stopTime).getTime();

          if (job.status === "scheduled" && now >= stopMs) {
            await window.FB.updateJob(job.id, { status: "waiting", tokensActive: false });
          }
          if (job.status === "waiting" && now >= reactivateMs) {
            const nextStop       = new Date(now + 5 * 3600000);
            const nextReactivate = new Date(now + 10 * 3600000);
            await window.FB.updateJob(job.id, {
              status: "active",
              tokensActive: true,
              lastFired: window.FB.Timestamp.now(),
              cycleCount: (job.cycleCount || 0) + 1,
              stopTime:      window.FB.Timestamp.fromDate(nextStop),
              reactivateAt:  window.FB.Timestamp.fromDate(nextReactivate),
            });
            showToast(`🔔 تم إعادة تفعيل التوكن: ${job.projectName}`, "info");
          }
        }
        renderJobs(jobs);
      } catch (e) {
        console.warn("Cron check error:", e);
      }
    }

    window.cronCheck  = cronCheck;
    window.firebaseReady = true;

    // Start after DOM ready
    document.addEventListener("DOMContentLoaded", () => {
      init();
      cronCheck();
      setInterval(cronCheck, 60000);
    });
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #030a06;
      --surface: #060e09;
      --border:  #1a3a2a;
      --green:   #00ff88;
      --dim:     #445;
      --text:    #ccddcc;
      --bright:  #e8ffe8;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── TOAST ── */
    #toast {
      position: fixed; top: 20px; right: 20px; z-index: 9999;
      padding: 12px 20px; border-radius: 10px; font-size: 13px;
      max-width: 320px; display: none;
      animation: slideIn .25s ease;
    }
    #toast.success { background:#0a2a14; border:1px solid var(--green); color:#88ffcc; }
    #toast.error   { background:#2a0a0a; border:1px solid #ff4488;     color:#ff8888; }
    #toast.info    { background:#0a1a2a; border:1px solid #00aaff;     color:#88ccff; }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(3,10,6,.92);
      border-bottom: 1px solid #0f2016;
      backdrop-filter: blur(12px);
      padding: 16px 32px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logo-tag  { font-size: 10px; color: #00ff8899; letter-spacing: 4px; margin-bottom: 2px; }
    .logo-name { font-size: 18px; font-weight: 800; color: var(--bright); }
    .logo-name span { color: var(--green); }
    .cron-pill {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--dim);
    }
    .cron-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    /* ── MAIN ── */
    .container { max-width: 900px; margin: 0 auto; padding: 32px 20px; }

    /* ── TABS ── */
    .tabs {
      display: flex; gap: 4px;
      background: var(--surface);
      padding: 4px; border-radius: 10px;
      border: 1px solid #0f2016;
      margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1; padding: 10px; border: none; border-radius: 7px;
      cursor: pointer; font-size: 13px; font-weight: 600;
      font-family: 'Syne', sans-serif;
      background: transparent; color: var(--dim);
      transition: all .2s;
    }
    .tab-btn.active {
      background: #0a2a14;
      color: var(--green);
      box-shadow: inset 0 0 0 1px #00ff8833;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    /* ── FORM ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    @media(max-width:600px){ .form-grid { grid-template-columns: 1fr; } }

    .form-group { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
    label { font-size: 11px; color: #00ff8877; letter-spacing: 2px; }
    label .hint { color: #334; font-weight: 400; letter-spacing: 0; }

    input, textarea, select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Syne', sans-serif;
      outline: none;
      width: 100%;
      transition: border-color .2s;
      color-scheme: dark;
    }
    input:focus, textarea:focus { border-color: var(--green); }
    textarea { resize: vertical; }

    .reactivate-hint {
      margin-top: 8px; padding: 10px 14px;
      background: #0a1a0a; border-radius: 8px;
      font-size: 12px; color: var(--dim);
    }
    .reactivate-hint span { color: var(--green); }

    /* ── SUBMIT BTN ── */
    .btn-submit {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #0a3a1a, #0f4a22);
      border: 1px solid #00ff8844;
      border-radius: 10px; color: var(--green);
      font-size: 15px; font-weight: 700;
      font-family: 'Syne', sans-serif;
      cursor: pointer; letter-spacing: 2px;
      transition: all .2s;
      animation: glow 3s infinite;
    }
    .btn-submit:disabled {
      background: #0a1a0a; cursor: not-allowed; animation: none; opacity: .6;
    }
    .btn-submit:not(:disabled):hover { background: linear-gradient(135deg, #0f4a22, #1a5a2a); }

    /* ── JOB CARD ── */
    .job-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .job-title  { font-size: 15px; font-weight: 700; color: var(--bright); margin-bottom: 3px; }
    .job-email  { font-size: 12px; color: var(--dim); }
    .job-meta   {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      margin-bottom: 12px; font-size: 11px; color: #445;
    }
    .job-meta span { color: #667; }
    .job-meta span.green { color: #00ff8877; }
    .job-notes  {
      font-size: 12px; color: #445;
      background: #0a1a0a; padding: 8px 12px;
      border-radius: 6px; margin-bottom: 12px;
    }
    .badge {
      display: inline-block; padding: 4px 12px;
      border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .badge-scheduled { background:#00aaff22; color:#00aaff; border:1px solid #00aaff44; }
    .badge-waiting   { background:#ff880022; color:#ff8800; border:1px solid #ff880044; }
    .badge-active    { background:#00ff8822; color:#00ff88; border:1px solid #00ff8844; }
    .badge-paused    { background:#44444422; color:#667;    border:1px solid #44444444; }

    .btn-delete {
      background: transparent; border: 1px solid #2a0a0a;
      color: #ff4488; padding: 4px 10px;
      border-radius: 6px; cursor: pointer; font-size: 11px;
      transition: all .2s;
    }
    .btn-delete:hover { background: #2a0a0a; }

    /* ── COUNTDOWN ── */
    .countdown {
      text-align: center; padding: 14px;
      background: rgba(0,255,136,.05);
      border-radius: 8px; border: 1px solid #0f3020;
    }
    .countdown-label { font-size: 10px; color: var(--dim); letter-spacing: 2px; margin-bottom: 6px; }
    .countdown-time  {
      font-family: 'Fira Code', monospace;
      font-size: 28px; letter-spacing: 4px;
      color: var(--green);
    }
    .countdown-time.done { color: #ff4488; animation: pulse 1s infinite; }

    /* ── EMPTY STATE ── */
    .empty { text-align: center; padding: 60px 20px; color: #334; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }

    /* ── STATUS LEGEND ── */
    .legend {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 10px; margin-top: 28px;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid #0f2016; border-radius: 10px;
    }
    @media(max-width:500px){ .legend { grid-template-columns: 1fr 1fr; } }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; }
    .legend-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── PANEL VISIBILITY ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── ANIMATIONS ── */
    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes slideIn  { from{transform:translateY(-12px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes glow     { 0%,100%{box-shadow:0 0 20px #00ff8818} 50%{box-shadow:0 0 40px #00ff8830} }
    @keyframes spin     { to{transform:rotate(360deg)} }
  </style>
</head>
<body>

<!-- ══ TOAST ══ -->
<div id="toast"></div>

<!-- ══ HEADER ══ -->
<header>
  <div>
    <div class="logo-tag">◈ CLOUD AUTOMATION</div>
    <div class="logo-name">Email Scheduler <span>&</span> Token Manager</div>
  </div>
  <div class="cron-pill">
    <div class="cron-dot"></div>
    <span>CRON ACTIVE</span>
  </div>
</header>

<!-- ══ MAIN ══ -->
<div class="container">

  <!-- ══ TABS ══ -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('scheduler', this)">📤 جدولة إيميل</button>
    <button class="tab-btn"       onclick="switchTab('jobs',      this)">📋 الجوبات النشطة</button>
  </div>

  <!-- ══ PANEL: SCHEDULER ══ -->
  <div id="panel-scheduler" class="panel active">

    <div class="form-grid">
      <div class="form-group">
        <label>البريد المستهدف *</label>
        <input id="f-email" type="email" placeholder="recipient@example.com" />
      </div>
      <div class="form-group">
        <label>اسم المشروع *</label>
        <input id="f-project" type="text" placeholder="مشروع الأتمتة" />
      </div>
    </div>

    <div class="form-group">
      <label>
        وقت التوقف *
        <span class="hint"> — تُوقف التوكنات هنا، وتُعاد بعد 5 ساعات</span>
      </label>
      <input id="f-stopTime" type="datetime-local" oninput="updateHint()" />
      <div id="reactivate-hint" class="reactivate-hint" style="display:none">
        🔄 إعادة التفعيل: <span id="reactivate-val"></span>
      </div>
    </div>

    <div class="form-group">
      <label>ملاحظات</label>
      <textarea id="f-notes" rows="4" placeholder="أي ملاحظات إضافية تخص المشروع أو الإيميل..."></textarea>
    </div>

    <button id="btn-submit" class="btn-submit" onclick="submitJob()">
      ☁️ جدولة على السحابة
    </button>
  </div>

  <!-- ══ PANEL: JOBS ══ -->
  <div id="panel-jobs" class="panel">
    <div id="jobs-list">
      <div class="empty">
        <div class="empty-icon">📭</div>
        <div>لا توجد جوبات بعد</div>
      </div>
    </div>
  </div>

  <!-- ══ STATUS LEGEND ══ -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#00aaff"></div><span style="color:#445;text-transform:uppercase;letter-spacing:1px">Scheduled</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff8800"></div><span style="color:#445;text-transform:uppercase;letter-spacing:1px">Waiting</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#00ff88"></div><span style="color:#445;text-transform:uppercase;letter-spacing:1px">Active</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#445"></div><span style="color:#445;text-transform:uppercase;letter-spacing:1px">Paused</span></div>
  </div>

</div>

<!-- ══ APP LOGIC ══ -->
<script>
  // ══════════════════════════════════════════════════════════
  // TOAST
  // ══════════════════════════════════════════════════════════
  function showToast(msg, type = "success") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = type;
    t.style.display = "block";
    setTimeout(() => { t.style.display = "none"; }, 3500);
  }
  window.showToast = showToast;

  // ══════════════════════════════════════════════════════════
  // TABS
  // ══════════════════════════════════════════════════════════
  function switchTab(name, btn) {
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("panel-" + name).classList.add("active");
    btn.classList.add("active");
    if (name === "jobs") loadAndRenderJobs();
  }

  // ══════════════════════════════════════════════════════════
  // REACTIVATION HINT
  // ══════════════════════════════════════════════════════════
  function updateHint() {
    const v = document.getElementById("f-stopTime").value;
    const hint = document.getElementById("reactivate-hint");
    if (!v) { hint.style.display = "none"; return; }
    const t = new Date(new Date(v).getTime() + 5 * 3600000);
    document.getElementById("reactivate-val").textContent = t.toLocaleString("ar-EG");
    hint.style.display = "block";
  }

  // ══════════════════════════════════════════════════════════
  // SUBMIT JOB
  // ══════════════════════════════════════════════════════════
  async function submitJob() {
    const email   = document.getElementById("f-email").value.trim();
    const project = document.getElementById("f-project").value.trim();
    const stopVal = document.getElementById("f-stopTime").value;
    const notes   = document.getElementById("f-notes").value.trim();

    if (!email || !project || !stopVal)
      return showToast("يرجى ملء جميع الحقول المطلوبة", "error");

    const btn = document.getElementById("btn-submit");
    btn.disabled = true;
    btn.textContent = "⏳ جارٍ الحفظ على السحابة...";

    try {
      const stopDate      = new Date(stopVal);
      const reactivateAt  = new Date(stopDate.getTime() + 5 * 3600000);
      const now           = Date.now();
      const status        = now >= stopDate.getTime() ? "waiting" : "scheduled";

      await window.FB.addJob({
        targetEmail:  email,
        projectName:  project,
        stopTime:     window.FB.Timestamp.fromDate(stopDate),
        reactivateAt: window.FB.Timestamp.fromDate(reactivateAt),
        notes,
        status,
        tokensActive: now < stopDate.getTime(),
      });

      document.getElementById("f-email").value    = "";
      document.getElementById("f-project").value  = "";
      document.getElementById("f-stopTime").value = "";
      document.getElementById("f-notes").value    = "";
      document.getElementById("reactivate-hint").style.display = "none";

      showToast("✅ تم الجدولة على Firebase بنجاح!");
    } catch (e) {
      showToast("❌ خطأ: " + e.message, "error");
    }

    btn.disabled = false;
    btn.textContent = "☁️ جدولة على السحابة";
  }

  // ══════════════════════════════════════════════════════════
  // LOAD + RENDER JOBS
  // ══════════════════════════════════════════════════════════
  window.renderJobs = renderJobs;
  window.loadAndRenderJobs = loadAndRenderJobs;

  async function loadAndRenderJobs() {
    if (!window.FB) return;
    const jobs = await window.FB.getJobs();
    renderJobs(jobs);
  }

  function renderJobs(jobs) {
    const el = document.getElementById("jobs-list");
    if (!jobs || jobs.length === 0) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div>لا توجد جوبات بعد</div></div>`;
      return;
    }

    const badgeClass = { scheduled:"badge-scheduled", waiting:"badge-waiting", active:"badge-active", paused:"badge-paused" };
    const statusIcon = { scheduled:"📅", waiting:"⏳", active:"✅", paused:"⏸️" };

    el.innerHTML = jobs.map(job => {
      const stopMs       = job.stopTime?.toMillis?.()     ?? new Date(job.stopTime).getTime();
      const reactivateMs = job.reactivateAt?.toMillis?.() ?? new Date(job.reactivateAt).getTime();
      const createdMs    = job.createdAt?.toMillis?.()    ?? Date.now();

      const countdownHtml = job.status === "waiting"
        ? `<div class="countdown" id="cd-${job.id}">
             <div class="countdown-label">إعادة التفعيل خلال</div>
             <div class="countdown-time" id="ct-${job.id}">--:--:--</div>
           </div>`
        : "";

      const notesHtml = job.notes
        ? `<div class="job-notes">📝 ${job.notes}</div>` : "";

      return `
        <div class="card">
          <div class="job-header">
            <div>
              <div class="job-title">${statusIcon[job.status] || "📌"} ${job.projectName}</div>
              <div class="job-email">→ ${job.targetEmail}</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
              <span class="badge ${badgeClass[job.status] || ''}">${job.status.toUpperCase()}</span>
              <button class="btn-delete" onclick="deleteJob('${job.id}')">✕ حذف</button>
            </div>
          </div>
          <div class="job-meta">
            <div>🕐 التوقف: <span>${new Date(stopMs).toLocaleString("ar-EG")}</span></div>
            <div>🔄 إعادة التفعيل: <span class="green">${new Date(reactivateMs).toLocaleString("ar-EG")}</span></div>
            <div>🔁 الدورات: <span>${job.cycleCount || 0}</span></div>
            <div>📅 أُنشئ: <span>${new Date(createdMs).toLocaleString("ar-EG")}</span></div>
          </div>
          ${notesHtml}
          ${countdownHtml}
        </div>`;
    }).join("");

    // Start countdowns
    jobs.filter(j => j.status === "waiting").forEach(job => {
      const reactivateMs = job.reactivateAt?.toMillis?.() ?? new Date(job.reactivateAt).getTime();
      startCountdown(job.id, reactivateMs);
    });
  }

  // ══════════════════════════════════════════════════════════
  // COUNTDOWN
  // ══════════════════════════════════════════════════════════
  const countdownIntervals = {};
  function startCountdown(id, targetMs) {
    if (countdownIntervals[id]) clearInterval(countdownIntervals[id]);
    const el = document.getElementById("ct-" + id);
    if (!el) return;

    const tick = () => {
      const diff = targetMs - Date.now();
      if (!document.getElementById("ct-" + id)) { clearInterval(countdownIntervals[id]); return; }
      if (diff <= 0) {
        el.textContent = "00:00:00";
        el.className = "countdown-time done";
        clearInterval(countdownIntervals[id]);
        return;
      }
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      el.textContent = `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    };
    tick();
    countdownIntervals[id] = setInterval(tick, 1000);
  }

  // ══════════════════════════════════════════════════════════
  // DELETE JOB
  // ══════════════════════════════════════════════════════════
  async function deleteJob(id) {
    if (!window.FB) return;
    if (!confirm("هل تريد حذف هذا الجوب؟")) return;
    await window.FB.deleteJob(id);
    showToast("تم حذف الجوب");
    loadAndRenderJobs();
  }

  // ══════════════════════════════════════════════════════════
  // INIT
  // ══════════════════════════════════════════════════════════
  function init() {}
</script>
